# ================= 策略组配置 =================
# 1. 默认代理组
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]DIRECT`.*
# 2. AI 专用组 (强制选美国节点，建议加入“节点选择”作为兜底，防止美国节点全挂)
custom_proxy_group=🤖️ 人工智能`select`[]🇺🇲 美国节点`[]🚀 节点选择
# 3. 自动测速组
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50
# 4. 美国节点筛选组 (建议使用 url-test 自动优选最快的美国节点，而不是 select 手动)
custom_proxy_group=🇺🇲 美国节点`url-test`(美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States)`http://www.gstatic.com/generate_204`300,,50

# ================= 规则配置 (严格按照优先级从上到下) =================

# 【第一优先级】：局域网/保留地址直连 (防止内网 DNS 泄露和死循环，必须带 no-resolve)
ruleset=DIRECT,[]IP-CIDR,192.168.0.0/16,no-resolve
ruleset=DIRECT,[]IP-CIDR,10.0.0.0/8,no-resolve
ruleset=DIRECT,[]IP-CIDR,172.16.0.0/12,no-resolve
ruleset=DIRECT,[]IP-CIDR,127.0.0.0/8,no-resolve
ruleset=DIRECT,[]IP-CIDR6,::1/128,no-resolve
ruleset=DIRECT,[]IP-CIDR6,fc00::/7,no-resolve
ruleset=DIRECT,[]IP-CIDR6,fe80::/10,no-resolve
ruleset=DIRECT,[]IP-CIDR6,fd00::/8,no-resolve

# 【第二优先级】：AI 服务专属路由 (走美国)
ruleset=🤖️ 人工智能,https://raw.githubusercontent.com/Chemistry1990/forsci/refs/heads/main/ai.list
# 注意：如果你觉得 Google 搜索不需要走美国，可以把下面这行改成 🚀 节点选择
ruleset=🤖️ 人工智能,https://raw.githubusercontent.com/Chemistry1990/forsci/refs/heads/main/Google.list

