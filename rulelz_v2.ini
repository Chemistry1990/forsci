ruleset=DIRECT,https://raw.githubusercontent.com/Chemistry1990/forsci/refs/heads/main/Direct.list

# 【第五优先级】：国内兜底 (防泄露核心)
# 优先匹配国内域名，如果匹配到了直接走 DIRECT，不再进行 DNS 解析
ruleset=DIRECT,[]GEOSITE,CN
# 域名未匹配时，如果是国内 IP 走直连。必须加 no-resolve 避免向海外 DNS 请求国内域名的 IP
ruleset=DIRECT,https://whatshub.top/rule/ASN-CN.list
ruleset=DIRECT,[]GEOIP,CN,no-resolve

# 【最后兜底】：所有未匹配的流量全部走代理
ruleset=🚀 节点选择,[]FINAL

enable_rule_generator=true
overwrite_original_rules=true
